name: Publish to Registry

permissions:
  contents: read
  id-token: write # Required for npm trusted publishing (OIDC)

on:
  workflow_call:
    inputs:
      cached-build-id:
        description: "ID for cached build"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      RELEASED_VERSION: ${{ steps.released-version.outputs.version }}

    steps:
      - name: Restore Build
        uses: actions/cache/restore@v5
        id: restore-build
        with:
          path: ./*
          key: ${{ inputs.cached-build-id }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Get Released Version
        id: released-version
        run: echo "version=$(node -pe "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm run build

      # Trusted publishing (OIDC) requires npm >= 11.5.1, which is newer than
      # the npm bundled with Node 24.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN: authentication and provenance are handled via the
      # OIDC id-token, configured as a trusted publisher on npmjs.com.
      - name: Publish to npm
        run: npm publish
