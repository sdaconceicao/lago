name: Testing Typescript

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      cached-build-id:
        description: "ID for cached build"
        required: true
        type: string
jobs:
  testing:
    name: Testing status checks
    runs-on: ubuntu-latest

    steps:
      - name: Restore Build
        uses: actions/cache/restore@v5
        id: restore-build
        with:
          path: ./*
          key: ${{ inputs.cached-build-id }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      - name: Setup Playwright browsers
        id: playwright-setup
        uses: ./.github/actions/setup-playwright

      - name: Run Biome (lint + format + import checks)
        run: pnpm exec biome ci --error-on-warnings .

      - name: Run type checking - frontend
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test:coverage
