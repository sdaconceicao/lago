name: Release Please
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (repo secret) so the opened PR triggers pull_request workflows.
      # PRs created with GITHUB_TOKEN do not fire other workflows (GitHub limitation).
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
