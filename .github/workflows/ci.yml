name: CI Checks

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [main]

jobs:
  checks:
    name: Status Checks
    uses: ./.github/workflows/workflow-typescript-checks.yml
  chromatic:
    needs: [checks]
    uses: ./.github/workflows/workflow-chromatic.yml
    with:
      cached-build-id: ${{ needs.checks.outputs.cache-key }}
    secrets:
      chromatic-token: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
